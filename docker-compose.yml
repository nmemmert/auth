version: "3.9"
services:
  node-backend:
    image: ghcr.io/nmemmert/auth-node-backend:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      PORT: ${NODE_BACKEND_PORT:-4100}
      AUTHELIA_USERS_FILE: /data/users_database.yml
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN}
    volumes:
      - type: bind
        source: ${AUTHELIA_USERS_FILE_HOST}
        target: /data/users_database.yml
        bind:
          create_host_path: false
    ports:
      - "${NODE_BACKEND_PORT:-4100}:${NODE_BACKEND_PORT:-4100}"

  node-frontend:
    image: ghcr.io/nmemmert/auth-node-frontend:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      NODE_BACKEND_PORT: ${NODE_BACKEND_PORT:-4100}
    depends_on:
      - node-backend
    ports:
      - "${NODE_FRONTEND_PORT:-3100}:3100"
