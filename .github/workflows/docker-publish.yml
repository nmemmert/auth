name: Build and Push Containers

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push node-backend
        uses: docker/build-push-action@v6
        with:
          context: ./node-stack/backend
          file: ./node-stack/backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/auth-node-backend:latest

      - name: Build and push node-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./node-stack/frontend
          file: ./node-stack/frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/auth-node-frontend:latest

      - name: Build and push python-backend
        uses: docker/build-push-action@v6
        with:
          context: ./python-stack/backend
          file: ./python-stack/backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/auth-python-backend:latest

      - name: Build and push python-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./python-stack/frontend
          file: ./python-stack/frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/auth-python-frontend:latest
